<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>tokenmill report catalog</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #607083;
      --line: #d8e0ea;
      --accent: #0f766e;
      --blue: #2563eb;
    }
    body {
      margin: 0;
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      background: #0f172a;
      color: white;
      padding: 30px 28px 24px;
    }
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 22px 42px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 30px;
      letter-spacing: 0;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }
    .sub {
      color: #cbd5e1;
      max-width: 760px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .controls {
      display: grid;
      grid-template-columns: minmax(220px, 2fr) repeat(4, minmax(140px, 1fr));
      gap: 10px;
    }
    input, select {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      background: white;
      min-width: 0;
    }
    .summary {
      color: var(--muted);
      margin-top: 12px;
    }
    .reports {
      display: grid;
      gap: 14px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: start;
    }
    .desc {
      color: var(--muted);
      margin: 4px 0 12px;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0;
    }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      color: var(--muted);
      font-size: 12px;
      background: #fbfdff;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 10px;
    }
    a {
      color: var(--accent);
      font-weight: 650;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .json {
      color: var(--blue);
    }
    details {
      margin-top: 12px;
    }
    code {
      display: block;
      overflow-x: auto;
      white-space: pre;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #f8fafc;
      padding: 10px;
      color: #334155;
    }
    @media (max-width: 760px) {
      .controls {
        grid-template-columns: 1fr;
      }
      .card-head {
        display: block;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>tokenmill report catalog</h1>
    <div class="sub">Find curated simulation reports by model, hardware, precision, system type, and study tags.</div>
  </header>
  <main>
    <section class="panel">
      <h2>Filters</h2>
      <div class="controls">
        <input id="search" placeholder="Search title, model, hardware, tag">
        <select id="model"><option value="">All models</option></select>
        <select id="hardware"><option value="">All hardware</option></select>
        <select id="precision"><option value="">All precision</option></select>
        <select id="tag"><option value="">All tags</option></select>
      </div>
      <div class="summary" id="summary"></div>
    </section>
    <section class="reports" id="reports"></section>
  </main>

  <script id="manifest" type="application/json">
[
  {
    "id": "llama8b-precision-hardware",
    "title": "Llama 8B Precision And Hardware",
    "description": "Compares Llama 8B FP8 vs W4A8KV4 across H100, H200, and B200 at 1 and 5 rps.",
    "models": ["llama-8b-fp8", "llama-8b-w4a8kv4"],
    "hardware": ["h100", "h200", "b200"],
    "systems": [],
    "precision": ["FP8", "W4A8KV4"],
    "tags": ["hardware", "precision", "cost", "energy", "latency"],
    "rows": 12,
    "duration_s": 10,
    "generated_from_commit": "0dcd73a",
    "html": "curated/llama8b-precision-hardware.html",
    "json": "curated/llama8b-precision-hardware.json",
    "command": "cargo run -- --study-models llama-8b-fp8,llama-8b-w4a8kv4 --study-gpus h100,h200,b200 --study-tps 1 --study-arrival-rates 1,5 --scheduler chunked-prefill --prompt-mean 512 --output-mean 128 --duration 10 --json-out reports/curated/llama8b-precision-hardware.json --html reports/curated/llama8b-precision-hardware.html"
  },
  {
    "id": "dgx-llama70b-comparison",
    "title": "DGX Llama 70B Comparison",
    "description": "Compares DGX H200 vs DGX B200 for Llama 70B FP8 and W4A8KV4 at TP=8 and TP=16.",
    "models": ["llama-70b-fp8", "llama-70b-w4a8kv4"],
    "hardware": ["h200", "b200"],
    "systems": ["dgx-h200", "dgx-b200"],
    "precision": ["FP8", "W4A8KV4"],
    "tags": ["dgx", "system", "scale-out", "precision", "cost", "energy", "latency"],
    "rows": 8,
    "duration_s": 10,
    "generated_from_commit": "0dcd73a",
    "html": "curated/dgx-llama70b-comparison.html",
    "json": "curated/dgx-llama70b-comparison.json",
    "command": "cargo run -- --study-models llama-70b-fp8,llama-70b-w4a8kv4 --study-systems dgx-h200,dgx-b200 --study-tps 8,16 --study-arrival-rates 1 --scheduler chunked-prefill --prompt-mean 1024 --output-mean 256 --duration 10 --json-out reports/curated/dgx-llama70b-comparison.json --html reports/curated/dgx-llama70b-comparison.html"
  }
]
  </script>
  <script>
    const manifest = JSON.parse(document.getElementById('manifest').textContent);
    const fields = {
      model: r => r.models,
      hardware: r => [...r.hardware, ...r.systems],
      precision: r => r.precision,
      tag: r => r.tags,
    };
    function uniq(values) {
      return [...new Set(values.flat())].sort();
    }
    function fillSelect(id, values) {
      const el = document.getElementById(id);
      for (const value of values) {
        const opt = document.createElement('option');
        opt.value = value;
        opt.textContent = value;
        el.appendChild(opt);
      }
    }
    fillSelect('model', uniq(manifest.map(fields.model)));
    fillSelect('hardware', uniq(manifest.map(fields.hardware)));
    fillSelect('precision', uniq(manifest.map(fields.precision)));
    fillSelect('tag', uniq(manifest.map(fields.tag)));

    function matches(report) {
      const q = document.getElementById('search').value.toLowerCase();
      const model = document.getElementById('model').value;
      const hardware = document.getElementById('hardware').value;
      const precision = document.getElementById('precision').value;
      const tag = document.getElementById('tag').value;
      const haystack = [
        report.title,
        report.description,
        ...report.models,
        ...report.hardware,
        ...report.systems,
        ...report.precision,
        ...report.tags,
      ].join(' ').toLowerCase();
      return (!q || haystack.includes(q)) &&
        (!model || report.models.includes(model)) &&
        (!hardware || report.hardware.includes(hardware) || report.systems.includes(hardware)) &&
        (!precision || report.precision.includes(precision)) &&
        (!tag || report.tags.includes(tag));
    }
    function pills(values) {
      return values.map(v => `<span class="pill">${v}</span>`).join('');
    }
    function render() {
      const data = manifest.filter(matches);
      document.getElementById('summary').textContent = `${data.length} of ${manifest.length} reports shown`;
      document.getElementById('reports').innerHTML = data.map(r => `
        <article class="card">
          <div class="card-head">
            <div>
              <h2>${r.title}</h2>
              <div class="desc">${r.description}</div>
            </div>
            <div class="pill">${r.rows} rows · ${r.duration_s}s</div>
          </div>
          <div class="meta">
            ${pills([...r.models, ...r.hardware, ...r.systems, ...r.precision, ...r.tags])}
          </div>
          <div class="links">
            <a href="${r.html}">Open HTML report</a>
            <a class="json" href="${r.json}">View JSON data</a>
          </div>
          <details>
            <summary>Regeneration command</summary>
            <code>${r.command}</code>
          </details>
        </article>
      `).join('');
    }
    ['search', 'model', 'hardware', 'precision', 'tag'].forEach(id => {
      document.getElementById(id).addEventListener('input', render);
    });
    render();
  </script>
</body>
</html>
